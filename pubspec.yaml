name: rego
description: REGO Buses — rider mobile app (Wadeny). Arabic-first, RTL.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # Localization (Arabic-first, RTL)
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Navigation
  go_router: ^17.3.0

  # Immutable models / JSON serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # HTTP client
  dio: ^5.7.0

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Utilities
  path_provider: ^2.1.5
  path: ^1.9.0

  # Secure session/token storage
  flutter_secure_storage: ^9.2.4

  # SVG rendering (brand marks: Google / Facebook / Apple)
  flutter_svg: ^2.0.17

  # In-app payment gateway (MyFatoorah hosted checkout via payment_url)
  webview_flutter: ^4.10.0

  # Opens the e-ticket PDF (invoice_url) in an external browser/PDF viewer
  url_launcher: ^6.3.1

  # Native splash hold until Flutter paints the matching first frame.
  flutter_native_splash: ^2.4.6
  shimmer: ^3.0.0

  # Icons (Tabler outline — design system source of truth)
  tabler_icons_plus: ^3.44.0

  # ── Optional: uncomment when needed ──────────────────────────────────────
  # Local database (Drift / SQLite)
  # drift: ^2.34.0
  # sqlite3_flutter_libs: ^0.6.0

  # Cloud backend (Supabase)
  # supabase_flutter: ^2.8.0

  # Permissions
  # permission_handler: ^11.3.1

  # File picker
  # file_picker: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  freezed: ^3.2.5
  json_serializable: ^6.14.0

  # ── Optional codegen: uncomment with drift ────────────────────────────────
  # drift_dev: ^2.34.0

flutter_native_splash:
  color: "#1464EC"
  image: assets/native_splash_logo.png
  android_12:
    color: "#1464EC"
    image: assets/native_splash_logo_android12.png
    icon_background_color: "#1464EC"
  android: true
  ios: false
  web: false

flutter:
  uses-material-design: true

  # Generate localizations from lib/l10n/*.arb (see l10n.yaml).
  generate: true

  assets:
    - .env
    - assets/
    - assets/brand/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Light.ttf
          weight: 300
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
