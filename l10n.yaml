# Flutter localization codegen config. Runs on `flutter pub get` (generate: true)
# or `flutter gen-l10n`. Generated Dart lands in lib/l10n/ (gitignored) and is
# imported as: package:rego/l10n/app_localizations.dart
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-dir: lib/l10n
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
